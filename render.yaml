services:
  - type: web
    name: smart-habit-tracker
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: HOST
        value: 0.0.0.0
      - key: DATABASE_PATH
        value: /opt/render/project/src/data/habits-data.json
      - key: JWT_SECRET
        sync: false
      - key: EMAIL_DELIVERY_ENABLED
        value: false
      - key: EMAIL_PROVIDER
        value: resend
      - key: RESEND_API_KEY
        sync: false
      - key: EMAIL_FROM
        value: Smart Habit <onboarding@resend.dev>
